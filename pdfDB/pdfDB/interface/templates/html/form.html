{% extends 'html/base.html' %}
{% block title %}Formulaire{% endblock %}
{% block hero_title %}Saisie des informations{% endblock %}
{% block hero_subtitle %}Remplissez les données des étudiants{% endblock %}

{% block content %}
<div class="card">
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Année scolaire</label>
            <input type="text" name="annee" required>
        </div>

        <div class="form-group">
            <label>École</label>
            <input type="text" name="ecole" required>
        </div>

        <div class="form-group">
            <label>Classe</label>
            <input type="text" name="classe" required>
        </div>

        <div class="form-group">
            <label>Élève</label>
            <input type="text" name="eleve" required>
        </div>

        <div class="form-group">
            <label>Pourcentage (%)</label>
            <input type="number" name="pourcentage" min="0" max="100" required>
        </div>

        <div class="buttons">
            <button type="submit" class="btn primary">Valider</button>
            <a href="{% url 'liste' %}" class="btn secondary">Afficher les enregistrements</a>
        </div>
    </form>
</div>
{% endblock %}

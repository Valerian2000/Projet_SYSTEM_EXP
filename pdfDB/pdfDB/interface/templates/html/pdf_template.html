{% load static %}
<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            /*background: #0f172a;*/
            color: black; /*white;*/
        }

        .hero {
        /*background: url("{% static 'img/images.jpg' %}") no-repeat center;*/
        background-size: cover;
        padding: 8px 40px;
        }
        .average-section{
        padding: 5px 40px;
        }

        h1 {
            font-size: 40px;
            margin: 0;
        }

        .title {
            padding-top: 10px;
            padding-bottom: 10px;

            margin-top: 10px;
            margin-bottom: 10px;
*
        }
        .subtitle {
            margin-top: 10px;
            font-size: 18px;
            /*color: #cbd5f5;*/
            color: #000000;
        }

        .section {
            padding: 40px;
        }

        .logo{
            background: url("{% static 'img/logo_unikin.png' %}") no-repeat center;
            background-size: cover;
            padding: 40px 10px;
            width: 10%;
            height: 100%;
            object-fit: contain; /* ou cover */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #000000;
            color: #fffefe;
        }

        tr:nth-child(even) {
            background: #ffffff;
        }
    </style>
</head>

<body>

    <div class="hero">
        <div class="logo"></div> 
        <h1 class="title">Liste des étudiants</h1>
        <div class="subtitle">Tous les enregistrements</div>
    </div>

    <div class="section">
        <h2>Tableau récapitulatif</h2>

        <table>
            <thead>
                <tr>
                    <th>Année</th>
                    <th>École</th>
                    <th>Classe</th>
                    <th>Élève</th>
                    <th>%</th> 
                    
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s.annee }}</td>
                    <td>{{ s.ecole }}</td>
                    <td>{{ s.classe }}</td>
                    <td>{{ s.eleve }}</td>
                    <td>{{ s.pourcentage }}%</td>
                    
                </tr>
                {% endfor %}
                
            </tbody>
        </table>

    </div>

    <div class="average-section" >
        <div class="subtitle"> la moyenne est : {{ moyenne|floatformat:2 }} % </div>
    </div>



</body>
</html>
